<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jones Signature Detailing</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: #e5e5e5;
    animation: fadeIn 1.5s ease-in;
}

/* Fade in page */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

header {
    background: linear-gradient(90deg, #111, #333);
    padding: 20px;
    text-align: center;
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 2px;
}

/* Hero section */
.hero {
    text-align: center;
    padding: 80px 20px;
}

/* Slide animation */
.hero h1 {
    font-size: 42px;
    animation: slideUp 1s ease;
}

@keyframes slideUp {
    from {
        transform: translateY(40px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

.btn {
    background: #444;
    padding: 12px 25px;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.3s;
}

/* Glow hover */
.btn:hover {
    background: #666;
    box-shadow: 0 0 15px #888;
}

/* Services */
.services {
    padding: 40px;
    text-align: center;
}

.service-box {
    background: #1a1a1a;
    margin: 15px;
    padding: 20px;
    border-radius: 10px;
    display: inline-block;
    width: 250px;
    border: 1px solid #333;
    transition: 0.3s;
}

/* Hover animation */
.service-box:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 10px 25px rgba(255,255,255,0.1);
}

footer {
    text-align: center;
    padding: 20px;
    background: #111;
    color: #888;
}
</style>

</head>

<body>

<header>
    Jones Signature Detailing
</header>

<section class="hero">
    <h1>Premium Mobile Car Detailing</h1>
    <p>We come to you — Greenville, SC</p>
    <button class="btn" onclick="callNow()">Call Now</button>
</section>

<section class="services">
    <h2>Our Services</h2>

    <div class="service-box">
        <h3>Exterior Wash</h3>
        <p>Full hand wash & shine</p>
    </div>

    <div class="service-box">
        <h3>Interior Detail</h3>
        <p>Deep clean & vacuum</p>
    </div>

    <div class="service-box">
        <h3>Full Detail</h3>
        <p>Inside & outside premium service</p>
    </div>
</section>

<footer>
    <p>📞 864-540-2573</p>
    <p>Greenville, South Carolina</p>
</footer>

<script>
function callNow() {
    window.location.href = "tel:8645402573";
}
</script>

</body>
</html>
